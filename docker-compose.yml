volumes:
  esdata01:
    driver: local
  kibanadata:
    driver: local

services:
  es01:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0   # стабильная версия
    networks:
      - elastic
    volumes:
      - esdata01:/usr/share/elasticsearch/data
    ports:
      - ${ES_PORT:-9200}:9200
    environment:
      - node.name=es01
      - cluster.name=docker-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false      # <-- отключаем безопасность
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    mem_limit: 1g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 10s
      timeout: 10s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    networks:
      - elastic
    volumes:
      - kibanadata:/usr/share/kibana/data
    ports:
      - ${KIBANA_PORT:-5601}:5601
    environment:
      - SERVERNAME=kibana
      - ELASTICSEARCH_HOSTS=http://es01:9200
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=d1e2f3g4h5j6k7l8m9n0
      - XPACK_REPORTING_ENCRYPTIONKEY=d1e2f3g4h5j6k7l8m9n0
    mem_limit: 512m
    depends_on:
      es01:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5601"]
      interval: 10s
      timeout: 10s
      retries: 10

  app:
    build: .
    env_file:
      - .env
    depends_on:
      es01:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - elastic

networks:
  elastic:
    external: false